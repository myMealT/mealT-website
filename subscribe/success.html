<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're subscribed! — mealT</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .portal-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .portal-icon { font-size: 3.5rem; margin-bottom: 20px; }
    .portal-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    .portal-sub {
      font-size: 1rem;
      color: var(--gray-500);
      max-width: 360px;
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .checkmark-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f0fdf4;
      border: 2px solid #86efac;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--gray-900);
      margin-bottom: 40px;
      justify-content: center;
    }
    .logo-row span:first-child { font-size: 1.4rem; }
    .tag {
      display: inline-block;
      background: var(--orange-lt);
      color: var(--orange);
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(249,115,22,.2);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="portal-page">
    <div class="logo-row">
      <span>🍽️</span><span>mealT</span>
    </div>

    <div class="tag">Premium Active</div>
    <div class="checkmark-ring">✓</div>
    <p class="portal-title">You're subscribed!</p>
    <p class="portal-sub">
      Welcome to mealT Premium. Your AI calls and premium features are now unlocked.
      Head back to the app to get started.
    </p>
    <a href="mealt://subscription/success" class="btn btn-primary" id="openBtn">
      Open mealT
    </a>
  </div>

  <script>
    // Auto-attempt deep link on load; the button is the fallback if the app isn't installed
    setTimeout(function () {
      window.location.href = 'mealt://subscription/success';
    }, 300);
  </script>
</body>
</html>
